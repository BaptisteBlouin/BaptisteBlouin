name: Update star count

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch star count and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARS=$(gh api repos/BaptisteBlouin/EventExtractionPapers --jq '.stargazers_count')
          sed -i "s/<!-- STARS_START -->[0-9]*<!-- STARS_END -->/<!-- STARS_START -->$STARS<!-- STARS_END -->/" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "Auto: update EventExtractionPapers star count" && git push)
